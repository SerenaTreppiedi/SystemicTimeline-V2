<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gli step verso un nuovo approccio di pensiero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
/* --- STILI BASE --- */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg,#1A1A1A 0%,#2A2A2A 100%);
    color:#fff;
    max-width:1400px;
    margin:0 auto;
    overflow-x: scroll;
    padding-top:160px;
    padding-bottom:30px;
    overscroll-behavior-x:none;
}
.header {text-align:center; padding:0.75rem; background: rgba(29,29,29,0.9); border-bottom:2px solid #BF953F; position:fixed; top:0; left:0; right:0; z-index:200000;}
.header h1 {font-family:'Darker Grotesque',sans-serif; font-size:2.5rem; font-weight:700; color:#BF953F; margin-bottom:0.25rem;}
.header p {font-size:1.1rem; opacity:0.8;}
.header-icons {position:absolute; top:50%; left:1.5rem; transform:translateY(-50%); display:flex; gap:0.8rem;}
.header-icon {width:32px;height:32px;border-radius:50%;background: rgba(191,149,63,0.2);border:1px solid rgba(191,149,63,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#BF953F; font-size:1rem;}
.header-icon:hover {background: rgba(191,149,63,0.3); transform:scale(1.1);}
.search-container {position:absolute; top:50%; right:1.5rem; transform:translateY(-50%);}
.search-input {padding:0.5rem 0.75rem; border-radius:18px; border:1px solid #BF953F; background:rgba(42,42,42,0.7); color:#fff; font-size:0.9rem; width:200px;}
.clear-search-btn {position:absolute; right:8px; top:50%; transform:translateY(-50%); display:none; background:none; border:none; color:rgba(255,255,255,0.7); cursor:pointer;}

/* --- TIMELINE --- */
.timeline-container {position:relative; padding:0.5rem 1rem; min-width:100%; overflow:visible;}
.timeline {position:relative; margin-bottom:0.75rem;}
.timeline-header {display:flex; align-items:center; margin-bottom:0.5rem; position:sticky; left:0; background: rgba(26,26,26,0.95); padding:0.4rem; border-radius:6px; z-index:100;}
.timeline-title {font-family:'Darker Grotesque',sans-serif; font-size:1.2rem; font-weight:400; color:#fff;}
.timeline-track {position:relative; height:38px; background: rgba(255,255,255,0.08); border-radius:8px; overflow:visible;}
.timeline-line {position:absolute; top:50%; left:0; right:0; height:2px; background: linear-gradient(90deg,#BF953F, rgba(255,255,255,0.3)); transform:translateY(-50%);}
.timeline-events {position:relative; height:100%; display:flex; align-items:center;}
.event {position:absolute; transform:translateX(-50%); cursor:pointer; z-index:1; transition:all 0.2s ease;}
.event-dot {width:12px; height:12px; border-radius:50%; background:#BF953F; border:2px solid #fff; transition:all 0.2s ease;}
.event:hover .event-dot {transform:scale(1.3);}

/* --- FOOTER --- */
.app-footer {position:fixed; bottom:0; left:0; right:0; padding:0.9rem 1rem; background: rgba(29,29,29,0.9); border-top:2px solid #BF953F; display:flex; justify-content:space-between; align-items:center; z-index:10000;}
.zoom-controls {display:flex; gap:0.6rem;}
.zoom-btn {background:#BF953F;color:#1A1A1A;border:none;padding:0.6rem;border-radius:50%; cursor:pointer; width:38px; height:38px; display:flex; align-items:center; justify-content:center;}
.zoom-level {background:rgba(255,255,255,0.12); color:#fff; padding:0.5rem 1rem; border-radius:22px; font-size:0.9rem;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-icons">
        <div class="header-icon" id="menuIcon" title="Menu">EN</div>
    </div>
    <h1 data-translate="Gli step verso un nuovo approccio di pensiero">Gli step verso un nuovo approccio di pensiero</h1>
    <p data-translate="Un viaggio attraverso l'evoluzione dell'approccio sistemico nella sostenibilità e nel design">Un viaggio attraverso l'evoluzione dell'approccio sistemico nella sostenibilità e nel design</p>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cerca eventi..." data-translate="Cerca eventi..." class="search-input">
        <button class="clear-search-btn" id="clearSearchBtn" title="Cancella ricerca">X</button>
    </div>
</div>

<!-- TIMELINE CONTAINER -->
<div class="timeline-container">
    <!-- Timeline 1 -->
    <div class="timeline" id="timeline-1-wrapper">
        <div class="timeline-header">
            <div class="timeline-title" data-translate="Storia Generale">Storia Generale</div>
        </div>
        <div class="timeline-track">
            <div class="timeline-line"></div>
            <div class="timeline-events" id="timeline-1"></div>
        </div>
    </div>
    <!-- Timeline 2-5 identiche, cambia solo id e title -->
    <div class="timeline" id="timeline-2-wrapper">
        <div class="timeline-header">
            <div class="timeline-title" data-translate="Enti">Enti</div>
        </div>
        <div class="timeline-track">
            <div class="timeline-line"></div>
            <div class="timeline-events" id="timeline-2"></div>
        </div>
    </div>
    <div class="timeline" id="timeline-3-wrapper">
        <div class="timeline-header">
            <div class="timeline-title" data-translate="Documentazione">Documentazione</div>
        </div>
        <div class="timeline-track">
            <div class="timeline-line"></div>
            <div class="timeline-events" id="timeline-3"></div>
        </div>
    </div>
    <div class="timeline" id="timeline-4-wrapper">
        <div class="timeline-header">
            <div class="timeline-title" data-translate="Eventi">Eventi</div>
        </div>
        <div class="timeline-track">
            <div class="timeline-line"></div>
            <div class="timeline-events" id="timeline-4"></div>
        </div>
    </div>
    <div class="timeline" id="timeline-5-wrapper">
        <div class="timeline-header">
            <div class="timeline-title" data-translate="Definizioni">Definizioni</div>
        </div>
        <div class="timeline-track">
            <div class="timeline-line"></div>
            <div class="timeline-events" id="timeline-5"></div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="app-footer">
    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOutBtn" onclick="zoomOut()">−</button>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <button class="zoom-btn" id="zoomInBtn" onclick="zoomIn()">+</button>
        <button class="zoom-btn" id="resetBtn" onclick="resetZoom()" title="Reset Zoom">↺</button>
    </div>
</footer>

<script>
let currentZoom = 1.0;
let timelineContainer;
let baseWidthPx;
let langMode = 'it';
const translations = {
    'Gli step verso un nuovo approccio di pensiero':'The Steps Towards a New Thinking Approach',
    'Un viaggio attraverso l\'evoluzione dell\'approccio sistemico nella sostenibilità e nel design':'A journey through the evolution of the systemic approach in sustainability and design',
    'Cerca eventi...':'Search events...',
    'Storia Generale':'General History',
    'Enti':'Organizations',
    'Documentazione':'Documentation',
    'Eventi':'Events',
    'Definizioni':'Definitions'
};

// Funzione traduzione
function applyTranslations(){
    document.querySelectorAll('[data-translate]').forEach(el=>{
        const key=el.getAttribute('data-translate');
        el.textContent=(langMode==='en'?translations[key]||el.textContent:key);
    });
}

// Cambio lingua
document.getElementById('menuIcon').addEventListener('click',()=>{
    const container=document.querySelector('.timeline-container');
    const savedScroll=container?container.scrollLeft:0;
    langMode=(langMode==='it'?'en':'it');
    applyTranslations();
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{if(container)container.scrollLeft=savedScroll;});});
    document.getElementById('menuIcon').innerHTML=langMode==='it'?'EN':'IT';
});

// Zoom / Reset
function applyZoom(){
    if(!baseWidthPx && timelineContainer) baseWidthPx=timelineContainer.clientWidth;
    if(timelineContainer) timelineContainer.style.width=`${baseWidthPx*currentZoom}px`;
    document.getElementById('zoomLevel').textContent=Math.round(currentZoom*100)+'%';
}
function zoomIn(){currentZoom=Math.min(currentZoom+0.5,5); applyZoom();}
function zoomOut(){currentZoom=Math.max(currentZoom-0.5,1); applyZoom();}
function resetZoom(){currentZoom=1; applyZoom(); requestAnimationFrame(()=>{if(timelineContainer)timelineContainer.scrollLeft=0;});}

document.addEventListener('DOMContentLoaded',function(){
    timelineContainer=document.querySelector('.timeline-container');
    if(!baseWidthPx) baseWidthPx=timelineContainer.clientWidth;
    applyZoom();
});
</script>

</body>
</html>
